<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <title>Layos Group | LMS</title>
  <style>
    /* Silent AI Engine: Aggressively hide Puter Branding/Banners/attribution */
    /* DO NOT HIDE MODALS, or students cannot click 'Continue' to enable AI! */
    [class*="puter-banner"],
    [id*="puter-banner"],
    .puter-attribution,
    #puter-attribution,
    .puter-cloud-menu,
    #puter-cloud-menu,
    [id*="puter-cloud-menu"],
    #puter-attribution-container {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
      height: 0 !important;
      width: 0 !important;
      z-index: -9999 !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    // Skip Puter.js Welcome Banner and Dialogs
    window.PUTER_NO_SPLASH = true;
    window.PUTER_NO_BANNER = true;
    window.puter_config = {
      no_ask_for_permissions: true,
      no_dialog: true,
      silent: true
    };
  </script>
  <script src="https://js.puter.com/v2/" data-no-splash="true" data-no-banner="true"></script>
  <script>
    // Proactive UI Hiding: Catch Puter.js as soon as it initializes
    (function() {
      const silencePuter = () => {
        if (window.puter && window.puter.ui) {
          if (typeof window.puter.ui.setMenuVisible === 'function') window.puter.ui.setMenuVisible(false);
          if (typeof window.puter.ui.hide === 'function') window.puter.ui.hide();
          if (typeof window.puter.ui.hideSpinner === 'function') window.puter.ui.hideSpinner();
        }
      };
      silencePuter();
      setTimeout(silencePuter, 100);
      setTimeout(silencePuter, 500);
      setTimeout(silencePuter, 1500);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
